<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viking Tracker - Événements</title>
  <link rel="stylesheet" href="/static/page/index.css?v=1">
  <link rel="stylesheet" href="/static/page/pays.css?v=1">
</head>
<body>
  <header>
    <div class="container">
      <div class="navbar">
        <a href="/" class="logo">
          <img src="/static/images/symbole.jpg" alt="Logo Viking Tracker" class="logo1">
        </a>
        <h1 class="site-title">Viking Tracker</h1>
        <ul>
          <li><a href="/">Accueil</a></li>
          <li><a href="/pays">Pays Scandinaves</a></li>
          <li><a href="/event">Événements</a></li>
          <li><a href="/aboutus">À propos</a></li>
          <li><a href="/create">table</a></li>
        </ul>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <h2 class="page-title">Événements</h2>

      <section class="pays-grid">
        {{range .}}
        <article class="pays-card wood-card">
          <div class="pays-card-inner">
            <h2 class="pays-title">{{.Name_event}}</h2>
            <div class="pays-body">
              <h3>Vikings participants :</h3>
              <ul>
                {{range .Vikings}}
                <li>
                  {{.Name}} 
                </li>
                {{end}}
              </ul>
            </div>
          </div>
        </article>
        {{else}}
        <article class="wood-card">
          <div class="wood-card-inner">
            <p>Aucun événement récupéré depuis l'API pour le moment.</p>
          </div>
        </article>
        {{end}}
      </section>
    </div>
  </main>
</body>
</html>
